name: pg_mobile
description: PG SaaS mobile client — consumes existing Next.js/Firestore backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.5
  google_sign_in: ^6.3.0
  flutter_secure_storage: ^9.2.4
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  razorpay_flutter: ^1.4.0
  fl_chart: ^0.70.2
  gap: ^3.0.1
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  open_filex: ^4.6.0
  cached_network_image: ^3.4.1
  file_picker: ^9.0.2
  permission_handler: ^11.4.0
  shimmer: ^3.0.0
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/config/
